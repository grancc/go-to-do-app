services:
  db:
    image: postgres:16-alpine
    container_name: gotodo-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gotodo}
      POSTGRES_USER: ${POSTGRES_USER:-gotodo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: gotodo-web
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-gotodo}
      POSTGRES_USER: ${POSTGRES_USER:-gotodo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
