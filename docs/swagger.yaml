basePath: /
definitions:
  gotodo.ToDoItem:
    properties:
      description:
        type: string
      done:
        type: boolean
      title:
        type: string
    required:
    - description
    - title
    type: object
  gotodo.ToDoList:
    properties:
      description:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  gotodo.UpdateListInput:
    properties:
      description:
        type: string
      title:
        type: string
    type: object
  gotodo.UpdateListItemInput:
    properties:
      description:
        type: string
      done:
        type: boolean
      title:
        type: string
    type: object
  gotodo.User:
    properties:
      name:
        type: string
      password_hash:
        type: string
      username:
        type: string
    required:
    - name
    - password_hash
    - username
    type: object
  handler.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  handler.IdResponse:
    properties:
      id:
        type: integer
    type: object
  handler.SignInInput:
    properties:
      password_hash:
        type: string
      username:
        type: string
    required:
    - password_hash
    - username
    type: object
  handler.StatusResponse:
    properties:
      status:
        type: string
    type: object
  handler.TokenResponse:
    properties:
      token:
        type: string
    type: object
  handler.getAllItemsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/gotodo.ToDoItem'
        type: array
    type: object
  handler.getAllListsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/gotodo.ToDoList'
        type: array
    type: object
host: localhost:8080
info:
  contact: {}
  description: 'API for todo lists. Protected routes: Authorization header with two
    words, e.g. Bearer plus JWT.'
  title: To Do App API
  version: "1.0"
paths:
  /api/{id}/items:
    get:
      parameters:
      - description: List id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.getAllItemsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List items in a list
      tags:
      - Items
    post:
      consumes:
      - application/json
      parameters:
      - description: List id
        in: path
        name: id
        required: true
        type: integer
      - description: New item
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/gotodo.ToDoItem'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.IdResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create item
      tags:
      - Items
  /api/items/{item_id}:
    delete:
      parameters:
      - description: Item id
        in: path
        name: item_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete item
      tags:
      - Items
    get:
      parameters:
      - description: Item id
        in: path
        name: item_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gotodo.ToDoItem'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get item by id
      tags:
      - Items
    put:
      consumes:
      - application/json
      parameters:
      - description: Item id
        in: path
        name: item_id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/gotodo.UpdateListItemInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update item
      tags:
      - Items
  /api/lists:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.getAllListsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List all todo lists
      tags:
      - Lists
    post:
      consumes:
      - application/json
      parameters:
      - description: New list
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/gotodo.ToDoList'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.IdResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create list
      tags:
      - Lists
  /api/lists/{id}:
    delete:
      parameters:
      - description: List id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete list
      tags:
      - Lists
    get:
      parameters:
      - description: List id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gotodo.ToDoList'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get list by id
      tags:
      - Lists
    put:
      consumes:
      - application/json
      parameters:
      - description: List id
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/gotodo.UpdateListInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update list
      tags:
      - Lists
  /auth/sign-in:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handler.SignInInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Sign in
      tags:
      - Auth
  /auth/sign-up:
    post:
      consumes:
      - application/json
      description: Create account; password is stored hashed server-side
      parameters:
      - description: User profile
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/gotodo.User'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.IdResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Register
      tags:
      - Auth
schemes:
- http
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
